<!DOCTYPE html>
<html lang="en">
<head>
<title>CPU Scheduling Simulator</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root{
    --bg: #f4f6fb;
    --card: #ffffff;
    --primary: #4f46e5;
    --secondary: #06b6d4;
    --accent: #f97316;
    --text-dark: #1e293b;
    --text-light: #64748b;
    --border: #e2e8f0;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Inter',sans-serif;
}

body{
    background: var(--bg);
    padding:40px 20px;
    display:flex;
    justify-content:center;
    color:var(--text-dark);
}

.container{
    width:100%;
    max-width:1000px;
    background:var(--card);
    padding:40px;
    border-radius:20px;
    box-shadow:0 20px 40px rgba(0,0,0,0.08);
}

h1{
    text-align:center;
    font-family:'Montserrat',sans-serif;
    font-size:2.4rem;
    color:var(--primary);
    margin-bottom:40px;
}

h3{
    margin-bottom:10px;
    color:var(--secondary);
}

.section{
    background:#fafafa;
    border:1px solid var(--border);
    padding:20px;
    border-radius:15px;
    margin-bottom:25px;
    display:flex;
    flex-wrap:wrap;
    gap:15px;
    align-items:center;
}

input,select{
    padding:10px 14px;
    border-radius:8px;
    border:1px solid var(--border);
    background:white;
    font-size:0.95rem;
    flex:1;
    min-width:120px;
}

input:focus,select:focus{
    outline:none;
    border-color:var(--primary);
    box-shadow:0 0 0 2px rgba(79,70,229,0.15);
}

button{
    padding:10px 22px;
    border:none;
    border-radius:8px;
    background:var(--primary);
    color:white;
    font-weight:600;
    cursor:pointer;
    transition:0.3s ease;
}

button:hover{
    background:var(--accent);
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:15px;
}

th{
    background:var(--primary);
    color:white;
    padding:12px;
}

td{
    padding:12px;
    border-bottom:1px solid var(--border);
    text-align:center;
}

tr:hover{
    background:#f1f5f9;
}

#gantt{
    margin-top:25px;
    padding:20px;
    background:#f8fafc;
    border-radius:12px;
    border:1px solid var(--border);
}

.gantt-box{
    display:inline-block;
    padding:10px 20px;
    margin:5px;
    background:var(--secondary);
    color:white;
    border-radius:8px;
    font-weight:600;
}

.idle{
    background:#ef4444;
}

.footer{
    margin-top:40px;
    text-align:center;
    color:var(--text-light);
    font-size:0.85rem;
}
</style>
</head>
<body>

<div class="container">

<h1>CPU Scheduling Simulator</h1>

<div class="section">
    <h3>Add Process</h3>
    PID <input type="text" id="pid" placeholder="e.g. P1">
    Arrival Time <input type="number" id="at" placeholder="0">
    Burst Time <input type="number" id="bt" placeholder="1">
    <button onclick="addProcess()">Add</button>
</div>

<div class="section">
    <h3>Select Algorithm</h3>
    <select id="algo">
        <option value="FCFS">FCFS</option>
        <option value="SJF">SJF (Non-Preemptive)</option>
    </select>
    <button onclick="simulate()">Simulate</button>
</div>

<h3>Process List</h3>
<table id="processTable">
    <tr><th>PID</th><th>AT</th><th>BT</th></tr>
</table>

<div id="selection"></div>
<div id="output"></div>
<div id="gantt"></div>

<div class="footer">
    © 2026 CPU Scheduling Project
</div>

</div>

<script>
let processes=[];

function addProcess(){
    let pid=document.getElementById("pid").value.trim();
    let at=parseInt(document.getElementById("at").value);
    let bt=parseInt(document.getElementById("bt").value);

    if(pid==""||isNaN(at)||isNaN(bt)||at<0||bt<=0){
        alert("Enter valid inputs!");
        return;
    }

    processes.push({pid,at,bt});

    let row=document.getElementById("processTable").insertRow();
    row.insertCell(0).innerHTML=pid;
    row.insertCell(1).innerHTML=at;
    row.insertCell(2).innerHTML=bt;

    document.getElementById("pid").value="";
    document.getElementById("at").value="";
    document.getElementById("bt").value="";
}

function simulate(){
    if(processes.length==0){
        alert("Add processes first!");
        return;
    }

    let algo=document.getElementById("algo").value;
    let time=0,completed=0,n=processes.length;
    let done=new Array(n).fill(false);
    let proc=JSON.parse(JSON.stringify(processes));
    let result=[];
    let ganttHTML="<h3>Gantt Chart</h3>";

    if(algo==="FCFS"){
        proc.sort((a,b)=>a.at-b.at);
    }

    while(completed<n){
        let idx=-1;

        if(algo==="SJF"){
            let min=9999;
            for(let i=0;i<n;i++){
                if(!done[i]&&proc[i].at<=time){
                    if(proc[i].bt<min){
                        min=proc[i].bt;
                        idx=i;
                    }
                }
            }
        }else{
            for(let i=0;i<n;i++){
                if(!done[i]){
                    idx=i;
                    break;
                }
            }
        }

        if(idx==-1){
            ganttHTML+="<div class='gantt-box idle'>Idle "+time+"-"+(time+1)+"</div>";
            time++;
            continue;
        }

        let start=time;
        let ct=time+proc[idx].bt;
        let tat=ct-proc[idx].at;
        let wt=tat-proc[idx].bt;

        result.push({pid:proc[idx].pid,at:proc[idx].at,bt:proc[idx].bt,wt:wt,tat:tat});

        ganttHTML+="<div class='gantt-box'>"+proc[idx].pid+" "+start+"-"+ct+"</div>";

        time=ct;
        done[idx]=true;
        completed++;
    }

    let totalWT=0;
    let outputHTML="<h3>Results</h3>";
    outputHTML+="<table><tr><th>PID</th><th>AT</th><th>BT</th><th>WT</th><th>TAT</th></tr>";

    result.forEach(p=>{
        totalWT+=p.wt;
        outputHTML+="<tr><td>"+p.pid+"</td><td>"+p.at+"</td><td>"+p.bt+"</td><td>"+p.wt+"</td><td>"+p.tat+"</td></tr>";
    });

    outputHTML+="</table>";
    outputHTML+="<h4>Average Waiting Time = "+(totalWT/n).toFixed(2)+"</h4>";

    document.getElementById("output").innerHTML=outputHTML;
    document.getElementById("gantt").innerHTML=ganttHTML;
}
</script>

</body>
</html>
